<!DOCTYPE html>
<html lang="uz">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-FXTXT79JXP"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-FXTXT79JXP');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kursga Yozilish - Sellers Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="lead-styles.css">
</head>
<body>
    <div class="container">
        <div class="lead-card">
            <div class="logo-section">
                <img src="logo sellers black.svg" alt="Sellers Pro" class="logo">
            </div>
            
            <h1 class="title">Kursga yozilish</h1>
            <p class="subtitle">Uzum Market bo'yicha professional savdo ko'nikmalarini o'rganing. Ma'lumotlaringizni qoldiring va biz siz bilan bog'lanamiz.</p>
            
            <form id="lead-form" class="lead-form">
                <div class="form-group">
                    <label for="name">Ismingiz <span class="required">*</span></label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Ismingizni kiriting"
                        required
                    >
                </div>
                
                <div class="form-group">
                    <label for="phone">Telefon raqamingiz <span class="required">*</span></label>
                    <input 
                        type="tel" 
                        id="phone" 
                        name="phone" 
                        placeholder="+998 90 123 45 67"
                        required
                    >
                </div>
                
                <button type="submit" class="submit-btn">
                    <span class="btn-text">Davom etish</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        <path d="M12 5L19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
            </form>
            
            <p class="privacy-text">
                Ma'lumotlaringiz maxfiy saqlanadi va uchinchi shaxslarga berilmaydi.
            </p>
        </div>
    </div>

    <script src="lead-script.js"></script>
</body>
</html>
